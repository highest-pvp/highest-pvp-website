<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIGHEST PVP | V2.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff0000; --glow: rgba(255, 0, 0, 0.6); }
        body { background: #080808; color: #fff; font-family: 'Rajdhani', sans-serif; }
        h1, h2, h3, .font-gaming { font-family: 'Orbitron', sans-serif; }

        /* --- NEW BUTTON STYLE --- */
        .btn-highest {
            background: transparent;
            border: 2px solid var(--red);
            color: #fff;
            padding: 12px 35px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            position: relative;
            transition: 0.4s;
            overflow: hidden;
            z-index: 1;
        }
        .btn-highest::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: var(--red);
            transition: 0.4s;
            z-index: -1;
        }
        .btn-highest:hover::before { left: 0; }
        .btn-highest:hover { color: #000; box-shadow: 0 0 30px var(--red); }

        /* --- NAVIGATION --- */
        nav { background: #000; border-bottom: 2px solid #111; padding: 25px 50px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-link { cursor: pointer; text-transform: uppercase; font-weight: bold; font-size: 14px; color: #555; transition: 0.3s; font-family: 'Orbitron'; }
        .nav-link:hover, .nav-link.active { color: var(--red); text-shadow: 0 0 10px var(--red); }

        /* --- SECTIONS --- */
        .section-content { display: none; padding: 60px 20px; animation: slideUp 0.5s ease; }
        .section-content.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- NEW STAFF FORM DESIGN --- */
        .staff-container {
            background: linear-gradient(145deg, #0f0f0f, #050505);
            border: 1px solid #1a1a1a;
            border-left: 5px solid var(--red);
            padding: 40px;
            max-width: 700px;
            margin: 0 auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .form-input {
            background: #111 !important;
            border: 1px solid #222 !important;
            color: #fff !important;
            padding: 15px !important;
            width: 100%;
            margin-bottom: 20px;
            outline: none;
            transition: 0.3s;
        }
        .form-input:focus { border-color: var(--red) !important; box-shadow: 0 0 10px rgba(255,0,0,0.2); }
        label { color: #888; font-family: 'Orbitron'; font-size: 11px; text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 1px; }

        /* --- STORE CARDS --- */
        .store-card { background: #0c0c0c; border: 1px solid #151515; padding: 15px; transition: 0.3s; }
        .store-card:hover { border-color: var(--red); transform: translateY(-5px); }
        .store-card img { width: 100%; height: 230px; object-fit: cover; margin-bottom: 15px; }

        /* --- MODAL IP --- */
        #ipModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1001; align-items: center; justify-content: center; }
        .ip-box { border: 2px solid var(--red); background: #000; padding: 60px; text-align: center; box-shadow: 0 0 50px var(--red); }
    </style>
</head>
<body>

    <div id="ipModal">
        <div class="ip-box">
            <h2 class="font-gaming text-red-600 text-2xl mb-6 italic">SERVER ADDRESS</h2>
            <div class="text-3xl font-mono mb-10 tracking-widest text-white">nyc.velocityhost.tn</div>
            <button onclick="closeIP()" class="btn-highest">CLOSE</button>
        </div>
    </div>

    <nav>
        <div class="flex items-center gap-4 cursor-pointer" onclick="window.location.reload()">
            <img src="https://i.postimg.cc/2yTMc72k/logo.png" class="w-10">
            <span class="font-gaming font-black italic text-xl tracking-tighter">HIGHEST <span class="text-red-600">PVP</span></span>
        </div>
        <div class="nav-links flex gap-10">
            <span onclick="openTab('store')" id="link-store" class="nav-link">Store</span>
            <span onclick="openIP()" class="nav-link">IP Connect</span>
            <span onclick="openTab('staff')" id="link-staff" class="nav-link">Staff App</span>
        </div>
    </nav>

    <main>
        <section id="home" class="section-content active text-center py-32">
            <img src="https://i.postimg.cc/2yTMc72k/logo.png" class="w-64 mx-auto mb-10 drop-shadow-[0_0_40px_red]">
            <h1 class="text-8xl font-black italic mb-12 tracking-tighter">HIGHEST <span class="text-red-600">PVP</span></h1>
            <div class="flex justify-center gap-6">
                <button onclick="openTab('store')" class="btn-highest">Enter Store</button>
                <button onclick="openTab('staff')" class="btn-highest" style="border-color: #fff;">Join Staff</button>
            </div>
        </section>

        <section id="store" class="section-content max-w-7xl mx-auto">
            <h2 class="font-gaming text-5xl text-red-600 text-center mb-20 italic uppercase tracking-tighter">Vip Guns</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-10 mb-32">
                <div class="store-card"><img src="https://i.postimg.cc/Y9qfkJwV/guns-1.jpg"><p class="text-center font-bold font-gaming text-xs uppercase tracking-widest">VIP GUNS</p></div>
                <div class="store-card"><img src="https://i.postimg.cc/PJCWvYJm/guns-2.jpg"><p class="text-center font-bold font-gaming text-xs uppercase tracking-widest">VIP GUNS</p></div>
                <div class="store-card"><img src="https://i.postimg.cc/br4QxrSV/guns-4.jpg"><p class="text-center font-bold font-gaming text-xs uppercase tracking-widest">VIP GUNS</p></div>
            </div>
            
            <h2 class="font-gaming text-5xl text-red-600 text-center mb-20 italic uppercase tracking-tighter">Vip Cars</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-10 pb-20">
                <div class="store-card"><img src="https://i.postimg.cc/rp9Q1Cjb/car1.jpg"><p class="text-center font-bold font-gaming text-xs uppercase tracking-widest">VIP CARS</p></div>
                <div class="store-card"><img src="https://i.postimg.cc/t4NMkjCB/car-2.png"><p class="text-center font-bold font-gaming text-xs uppercase tracking-widest">VIP CARS</p></div>
                <div class="store-card"><img src="https://i.postimg.cc/nVmTTJ3Q/car3.png"><p class="text-center font-bold font-gaming text-xs uppercase tracking-widest">VIP CARS</p></div>
            </div>
        </section>

        <section id="staff" class="section-content">
            <div class="staff-container">
                <h2 class="font-gaming text-3xl text-white mb-2 italic">STAFF RECRUITMENT</h2>
                <p class="text-red-600 mb-10 text-xs font-bold uppercase tracking-widest">Fill the form below to apply</p>
                
                <form id="staffForm">
                    <label>Full Name</label>
                    <input type="text" id="fn" class="form-input" placeholder="Enter your name" required>
                    
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label>Age</label>
                            <input type="number" id="age" class="form-input" placeholder="16+" required>
                        </div>
                        <div>
                            <label>Discord</label>
                            <input type="text" id="dc" class="form-input" placeholder="Username" required>
                        </div>
                    </div>
                    
                    <label>Experience</label>
                    <select id="exp" class="form-input" style="appearance: none;">
                        <option>No experience</option>
                        <option>Intermediate (Helper/Mod)</option>
                        <option>Expert (Admin/Owner)</option>
                    </select>
                    
                    <label>Why you?</label>
                    <textarea id="why" rows="4" class="form-input" placeholder="Tell us why we should choose you..." required></textarea>
                    
                    <button type="submit" id="sBtn" class="btn-highest w-full mt-4">SEND APPLICATION</button>
                    <p id="cool" class="hidden text-red-500 text-center font-bold mt-6 uppercase text-xs">Locked: You can apply once every 24h</p>
                </form>
            </div>
        </section>
    </main>

    <script>
        function openTab(t) {
            document.querySelectorAll('.section-content').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(x => x.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            if(document.getElementById('link-'+t)) document.getElementById('link-'+t).classList.add('active');
            window.scrollTo(0,0);
        }

        function openIP() { document.getElementById('ipModal').style.display = 'flex'; }
        function closeIP() { document.getElementById('ipModal').style.display = 'none'; }

        // Webhook + Cooldown 24h
        const form = document.getElementById('staffForm');
        const btn = document.getElementById('sBtn');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const last = localStorage.getItem('last_sub_highest');
            const now = new Date().getTime();

            if (last && (now - last < 86400000)) {
                document.getElementById('cool').classList.remove('hidden');
                return;
            }

            btn.innerText = "SENDING...";
            btn.disabled = true;

            const payload = {
                username: "HIGHEST SYSTEM",
                embeds: [{
                    title: "🚀 NEW STAFF APPLICATION",
                    color: 16711680,
                    fields: [
                        {name: "👤 User", value: document.getElementById('fn').value, inline: true},
                        {name: "🔞 Age", value: document.getElementById('age').value, inline: true},
                        {name: "📱 Discord", value: document.getElementById('dc').value},
                        {name: "🎓 Experience", value: document.getElementById('exp').value},
                        {name: "📝 Motivation", value: document.getElementById('why').value}
                    ],
                    timestamp: new Date()
                }]
            };

            fetch("https://discord.com/api/webhooks/1488578109530706153/vS_s9jU-eEI50Xl6rfcqrtjRPufrolrEV-oDRanABlQw9BUHmpb66QRbZtLT7j2V08Ul", 
            { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) })
            .then(() => {
                alert("Application sent successfully!");
                localStorage.setItem('last_sub_highest', new Date().getTime());
                btn.innerText = "SENT";
                form.reset();
            });
        });
    </script>
</body>
</html>
