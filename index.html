<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <title>HIGHEST PVP | OFFICIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff0000; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; min-height: 100vh; margin: 0; }
        h1, h2, h3, .font-gaming { font-family: 'Orbitron', sans-serif; }

        /* Navigation Style */
        nav { background: #000; border-bottom: 1px solid #1a1a1a; padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; sticky: top; z-index: 100; }
        .nav-links { display: flex; gap: 30px; }
        .nav-link { cursor: pointer; text-transform: uppercase; font-weight: bold; font-size: 13px; color: #666; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { color: var(--red); text-shadow: 0 0 10px var(--red); }

        /* Button Style */
        .btn-action { 
            background: transparent; border: 1px solid var(--red); color: #fff; 
            padding: 12px 30px; text-transform: uppercase; font-weight: 900; 
            letter-spacing: 2px; cursor: pointer; transition: 0.3s; 
        }
        .btn-action:hover { background: var(--red); color: #000; box-shadow: 0 0 20px var(--red); }

        /* Store & Sections */
        .tab-content { display: none; padding: 50px 20px; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 15px; transition: 0.3s; }
        .card:hover { border-color: var(--red); }
        .card img { width: 100%; h-56; object-fit: cover; border-radius: 4px; }

        /* Modal IP */
        #ipModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .ip-frame { border: 2px solid var(--red); background: #000; padding: 40px; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 0 40px var(--red); }

        /* Form */
        input, textarea, select { background: #111; border: 1px solid #222; color: #fff; width: 100%; padding: 12px; margin-bottom: 15px; outline: none; }
        input:focus { border-color: var(--red); }
    </style>
</head>
<body>

    <div id="ipModal">
        <div class="ip-frame">
            <h2 class="font-gaming text-red-600 mb-4 italic">SERVER IP</h2>
            <div class="text-2xl font-mono mb-8">nyc.velocityhost.tn</div>
            <button onclick="closeIP()" class="btn-action text-xs">CLOSE</button>
        </div>
    </div>

    <nav>
        <div class="flex items-center gap-3">
            <img src="https://i.postimg.cc/2yTMc72k/logo.png" class="w-8">
            <span class="font-gaming font-black italic">HIGHEST</span>
        </div>
        <div class="nav-links">
            <span onclick="openTab('store')" id="link-store" class="nav-link">Store</span>
            <span onclick="openIP()" class="nav-link">IP Connect</span>
            <span onclick="openTab('staff')" id="link-staff" class="nav-link">Staff App</span>
        </div>
    </nav>

    <main>
        <section id="home" class="tab-content active text-center py-20">
            <img src="https://i.postimg.cc/2yTMc72k/logo.png" class="w-60 mx-auto mb-10 drop-shadow-[0_0_30px_red]">
            <h1 class="text-7xl font-black italic mb-10">HIGHEST <span class="text-red-600">PVP</span></h1>
            <button onclick="openTab('store')" class="btn-action px-20 text-xl">GO TO STORE</button>
        </section>

        <section id="store" class="tab-content max-w-6xl mx-auto">
            <h2 class="font-gaming text-4xl text-red-600 text-center mb-12 uppercase italic">Vip Guns</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-20">
                <div class="card"><img src="https://i.postimg.cc/Y9qfkJwV/guns-1.jpg"><p class="text-center mt-4 font-bold uppercase">Vip Guns</p></div>
                <div class="card"><img src="https://i.postimg.cc/PJCWvYJm/guns-2.jpg"><p class="text-center mt-4 font-bold uppercase">Vip Guns</p></div>
                <div class="card"><img src="https://i.postimg.cc/br4QxrSV/guns-4.jpg"><p class="text-center mt-4 font-bold uppercase">Vip Guns</p></div>
            </div>
            
            <h2 class="font-gaming text-4xl text-red-600 text-center mb-12 uppercase italic">Vip Cars</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 pb-20">
                <div class="card"><img src="https://i.postimg.cc/rp9Q1Cjb/car1.jpg"><p class="text-center mt-4 font-bold uppercase">Vip Cars</p></div>
                <div class="card"><img src="https://i.postimg.cc/t4NMkjCB/car-2.png"><p class="text-center mt-4 font-bold uppercase">Vip Cars</p></div>
                <div class="card"><img src="https://i.postimg.cc/nVmTTJ3Q/car3.png"><p class="text-center mt-4 font-bold uppercase">Vip Cars</p></div>
            </div>
        </section>

        <section id="staff" class="tab-content max-w-2xl mx-auto">
            <div class="card p-10">
                <h2 class="font-gaming text-3xl text-red-600 mb-8 italic uppercase">Staff Application</h2>
                <form id="staffForm">
                    <input type="text" id="fn" placeholder="Full Name" required>
                    <input type="number" id="age" placeholder="Age" required>
                    <input type="text" id="dc" placeholder="Discord Username" required>
                    <textarea id="why" rows="4" placeholder="Why should we accept you?" required></textarea>
                    <button type="submit" id="sBtn" class="btn-action w-full">SUBMIT</button>
                    <p id="cool" class="hidden text-red-500 text-center mt-4 font-bold">LOCKED: 24H</p>
                </form>
            </div>
        </section>
    </main>

    <script>
        function openTab(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(x => x.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            if(document.getElementById('link-'+t)) document.getElementById('link-'+t).classList.add('active');
            window.scrollTo(0,0);
        }

        function openIP() { document.getElementById('ipModal').style.display = 'flex'; }
        function closeIP() { document.getElementById('ipModal').style.display = 'none'; }

        // Webhook with Cooldown
        document.getElementById('staffForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const last = localStorage.getItem('last_sub');
            const now = new Date().getTime();
            if (last && (now - last < 86400000)) { document.getElementById('cool').classList.remove('hidden'); return; }

            const btn = document.getElementById('sBtn');
            btn.innerText = "SENDING...";
            
            const payload = {
                username: "HIGHEST RECRUITER",
                embeds: [{
                    title: "NEW STAFF APP", color: 16711680,
                    fields: [
                        {name: "User", value: document.getElementById('fn').value},
                        {name: "Discord", value: document.getElementById('dc').value},
                        {name: "Reason", value: document.getElementById('why').value}
                    ]
                }]
            };

            fetch("https://discord.com/api/webhooks/1488578109530706153/vS_s9jU-eEI50Xl6rfcqrtjRPufrolrEV-oDRanABlQw9BUHmpb66QRbZtLT7j2V08Ul", 
            { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) })
            .then(() => {
                alert("Application Sent!");
                localStorage.setItem('last_sub', new Date().getTime());
                btn.innerText = "SENT";
            });
        });
    </script>
</body>
</html>
