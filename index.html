<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <title>HIGHEST PVP | V2.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-red: #ff0000; --glow: rgba(255, 0, 0, 0.7); }
        body { background: #050505; color: #fff; font-family: 'Rajdhani', sans-serif; min-height: 100vh; }
        h1, h2, h3, .font-gaming { font-family: 'Orbitron', sans-serif; }

        /* Style Jdid lel Buttons */
        .btn-highest { 
            background: transparent; 
            border: 1px solid var(--main-red); 
            color: #fff; 
            padding: 10px 25px; 
            text-transform: uppercase; 
            font-weight: 900; 
            letter-spacing: 2px; 
            transition: 0.3s; 
            cursor: pointer;
            box-shadow: inset 0 0 5px var(--glow);
        }
        .btn-highest:hover { 
            background: var(--main-red); 
            box-shadow: 0 0 20px var(--main-red); 
            color: #000; 
        }

        .nav-link { cursor: pointer; font-family: 'Orbitron'; font-size: 12px; color: #666; transition: 0.3s; text-transform: uppercase; }
        .nav-link:hover, .nav-link.active { color: #ff0000; text-shadow: 0 0 10px #ff0000; }

        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Store Cards */
        .item-card { border: 1px solid #1a1a1a; background: #0a0a0a; transition: 0.3s; overflow: hidden; }
        .item-card:hover { border-color: #ff0000; box-shadow: 0 0 15px rgba(255,0,0,0.2); }

        /* IP Modal */
        #ipModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 999; align-items: center; justify-content: center; }
        .ip-box { border: 2px solid #ff0000; padding: 50px; background: #000; box-shadow: 0 0 50px #ff0000; text-align: center; }
    </style>
</head>
<body>

    <div id="ipModal">
        <div class="ip-box">
            <h2 class="font-gaming text-red-600 text-2xl mb-6 italic italic">SERVER IP</h2>
            <div class="text-3xl font-mono mb-10 tracking-widest">nyc.velocityhost.tn</div>
            <button onclick="closeIP()" class="btn-highest">CLOSE</button>
        </div>
    </div>

    <nav class="flex justify-between items-center px-10 py-8 border-b border-zinc-900 bg-black">
        <div class="flex items-center gap-3">
            <img src="https://i.postimg.cc/2yTMc72k/logo.png" class="w-10 drop-shadow-[0_0_5px_red]">
            <span class="font-gaming font-black italic">HIGHEST</span>
        </div>
        <div class="flex gap-8">
            <span onclick="openTab('store')" id="link-store" class="nav-link">Store</span>
            <span onclick="openIP()" class="nav-link">IP Connect</span>
            <span onclick="openTab('staff')" id="link-staff" class="nav-link">Staff App</span>
        </div>
    </nav>

    <main class="py-10">
        <section id="home" class="tab-content active text-center py-20">
            <img src="https://i.postimg.cc/2yTMc72k/logo.png" class="w-60 mx-auto mb-10">
            <h1 class="text-7xl font-black italic mb-16 uppercase">HIGHEST <span class="text-red-600">PVP</span></h1>
            <button onclick="openTab('store')" class="btn-highest px-20 py-5 text-xl">ENTER STORE</button>
        </section>

        <section id="store" class="tab-content px-6 max-w-6xl mx-auto">
            <h2 class="font-gaming text-4xl text-center text-red-600 mb-12 uppercase italic">Vip Guns</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-20">
                <div class="item-card p-2"><img src="https://i.postimg.cc/Y9qfkJwV/guns-1.jpg" class="w-full h-56 object-cover"><p class="py-4 text-center font-bold">VIP GUNS</p></div>
                <div class="item-card p-2"><img src="https://i.postimg.cc/PJCWvYJm/guns-2.jpg" class="w-full h-56 object-cover"><p class="py-4 text-center font-bold">VIP GUNS</p></div>
                <div class="item-card p-2"><img src="https://i.postimg.cc/br4QxrSV/guns-4.jpg" class="w-full h-56 object-cover"><p class="py-4 text-center font-bold">VIP GUNS</p></div>
            </div>
            <h2 class="font-gaming text-4xl text-center text-red-600 mb-12 uppercase italic">Vip Cars</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 pb-20">
                <div class="item-card p-2"><img src="https://i.postimg.cc/rp9Q1Cjb/car1.jpg" class="w-full h-56 object-cover"><p class="py-4 text-center font-bold">VIP CARS</p></div>
                <div class="item-card p-2"><img src="https://i.postimg.cc/t4NMkjCB/car-2.png" class="w-full h-56 object-cover"><p class="py-4 text-center font-bold">VIP CARS</p></div>
                <div class="item-card p-2"><img src="https://i.postimg.cc/nVmTTJ3Q/car3.png" class="w-full h-56 object-cover"><p class="py-4 text-center font-bold">VIP CARS</p></div>
            </div>
        </section>

        <section id="staff" class="tab-content px-6 max-w-2xl mx-auto">
            <div class="bg-black border border-red-900/30 p-10">
                <h2 class="font-gaming text-3xl text-red-600 mb-8 italic uppercase">Staff Application</h2>
                <form id="staffForm" class="space-y-6 text-sm">
                    <div><label class="text-red-600 block mb-2 uppercase font-bold">Full Name</label><input type="text" id="fn" class="w-full bg-zinc-900 border border-zinc-800 p-3 outline-none focus:border-red-600" required></div>
                    <div><label class="text-red-600 block mb-2 uppercase font-bold">Age</label><input type="number" id="age" class="w-full bg-zinc-900 border border-zinc-800 p-3 outline-none focus:border-red-600" required></div>
                    <div><label class="text-red-600 block mb-2 uppercase font-bold">Discord Tag</label><input type="text" id="dc" class="w-full bg-zinc-900 border border-zinc-800 p-3 outline-none focus:border-red-600" required></div>
                    <div><label class="text-red-600 block mb-2 uppercase font-bold">Why join us?</label><textarea id="why" rows="4" class="w-full bg-zinc-900 border border-zinc-800 p-3 outline-none focus:border-red-600" required></textarea></div>
                    <button type="submit" id="sBtn" class="btn-highest w-full py-4">SUBMIT APPLICATION</button>
                    <p id="cool" class="hidden text-red-500 text-center font-bold mt-4 uppercase">Locked for 24h</p>
                </form>
            </div>
        </section>
    </main>

    <script>
        function openTab(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(x => x.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            if(document.getElementById('link-'+t)) document.getElementById('link-'+t).classList.add('active');
        }
        function openIP() { document.getElementById('ipModal').style.display = 'flex'; }
        function closeIP() { document.getElementById('ipModal').style.display = 'none'; }

        // Webhook
        document.getElementById('staffForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('sBtn');
            const last = localStorage.getItem('last_sub');
            const now = new Date().getTime();

            if (last && (now - last < 86400000)) {
                document.getElementById('cool').classList.remove('hidden');
                return;
            }

            btn.innerText = "SENDING...";
            const payload = {
                username: "HIGHEST BOT",
                embeds: [{
                    title: "NEW STAFF APP", color: 16711680,
                    fields: [
                        {name: "Name", value: document.getElementById('fn').value},
                        {name: "Discord", value: document.getElementById('dc').value},
                        {name: "Why", value: document.getElementById('why').value}
                    ]
                }]
            };

            fetch("https://discord.com/api/webhooks/1488578109530706153/vS_s9jU-eEI50Xl6rfcqrtjRPufrolrEV-oDRanABlQw9BUHmpb66QRbZtLT7j2V08Ul", 
            { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) })
            .then(() => {
                alert("Sent!");
                localStorage.setItem('last_sub', new Date().getTime());
                btn.innerText = "SENT";
            });
        });
    </script>
</body>
</html>
