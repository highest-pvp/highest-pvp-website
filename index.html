<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Highest PVP - Official Site</title>
    <style>
        /* Design mte3 el bare7 (Cars & Dark Mode) */
        body { background-color: #0d0d0d; color: #fff; font-family: 'Arial', sans-serif; margin: 0; padding: 0; text-align: center; }
        .header { background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('car1.jpg'); background-size: cover; padding: 50px; border-bottom: 3px solid #ff0000; }
        .car-grid { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .car-card { margin: 15px; border: 1px solid #333; border-radius: 10px; overflow: hidden; background: #1a1a1a; width: 280px; transition: 0.3s; }
        .car-card:hover { border-color: #ff0000; transform: scale(1.05); }
        .car-card img { width: 100%; height: 180px; object-fit: cover; }
        .car-info { padding: 15px; }
        .price { color: #ff0000; font-size: 1.4rem; font-weight: bold; }

        /* Section Application Pixo */
        .app-section { background: #111; border: 2px solid #ff0000; padding: 40px; border-radius: 15px; max-width: 500px; margin: 50px auto; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn-submit { background: #ff0000; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .btn-submit:disabled { background: #555; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="color: #ff0000; font-size: 3rem;">HIGHEST PVP</h1>
    <p>Premium Tunisian Roleplay Server</p>
</div>

<h2 style="margin-top: 40px;">SERVER STORE - CARS</h2>
<div class="car-grid">
    <div class="car-card">
        <img src="car1.jpg" alt="Car 1">
        <div class="car-info"><h3>Sport Pack 1</h3><p class="price">20 TND</p></div>
    </div>
    <div class="car-card">
        <img src="car2.png" alt="Car 2">
        <div class="car-info"><h3>Luxury Pack</h3><p class="price">35 TND</p></div>
    </div>
    <div class="car-card">
        <img src="car3.png" alt="Car 3">
        <div class="car-info"><h3>Offroad Pack</h3><p class="price">15 TND</p></div>
    </div>
</div>

<div class="app-section">
    <h2 style="color: #ff0000;">APPLY FOR STAFF / PLAYER</h2>
    <p style="font-size: 0.8rem; color: #888;">IP Tracking & Anti-Spam Active</p>
    
    <label style="display:block; text-align:left;">Discord Tag</label>
    <input type="text" id="discord_tag" placeholder="Pixo#0001">

    <label style="display:block; text-align:left;">Backstory / Why you?</label>
    <textarea id="backstory_input" rows="5" placeholder="Write here..."></textarea>

    <button id="submitBtn" class="btn-submit" onclick="sendApp()">SUBMIT APPLICATION</button>
</div>

<footer>
    <p>&copy; 2026 Highest PVP - Protected by Pixo</p>
</footer>

<script>
<script>
async function sendApp() {
    // 1. El link el jdid mte3 el Google Script (Security Proxy)
    const scriptURL = "https://script.google.com/macros/s/AKfycbxGue-J07EOUXghjiQoXTo23N2F9-BJLRfeEpEBCQ3vgCV-KpBMRHdTtvs8lT4AGzib/exec";
    const btn = document.getElementById('submitBtn');

    // Thabbet elli el IDs mte3 el inputs f-el HTML mte3ek m-smiyin haka bedhabt:
    const discordInput = document.getElementById('discord_tag');
    const messageInput = document.getElementById('backstory_input');

    if (!discordInput.value || !messageInput.value) {
        alert("A3mmer el ma3loumat el kol!");
        return;
    }

    try {
        btn.disabled = true;
        btn.innerText = "Checking Security...";

        // 2. Fazet el IP Tracker (Bech n-ab3athouha l-Google Script)
        const ipRes = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipRes.json();
        const userIP = ipData.ip;

        // 3. Nab3ath l-el Google Script Proxy (Anti-Spam)
        btn.innerText = "Sending to Pixo...";
        
        await fetch(scriptURL + "?ip=" + userIP, {
            method: 'POST',
            mode: 'no-cors', 
            body: JSON.stringify({
                discord: discordInput.value,
                message: messageInput.value
            })
        });

        alert("Application sent successfully! Pixo System secured your IP.");
        btn.innerText = "SENT!";
        
        // Clear inputs
        discordInput.value = "";
        messageInput.value = "";

    } catch (error) {
        console.error(error);
        alert("Famma error, 3awed jarreb!");
        btn.disabled = false;
        btn.innerText = "SUBMIT";
    }
}
</script>
</script>

</body>
</html>
