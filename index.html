<script>
async function sendApp() {
    // El Link el jdid elli b3at-houli enti tawwa
    const scriptURL = "https://script.google.com/macros/s/AKfycbxGue-J07EOUXghjiQoXTo23N2F9-BJLRfeEpEBCQ3vgCV-KpBMRHdTtvs8lT4AGzib/exec";
    const btn = document.getElementById('submitBtn');

    // Thabbet f-el IDs mte3 el inputs f-el HTML mte3ek!
    const discordInput = document.getElementById('discord_tag');
    const messageInput = document.getElementById('backstory_input');

    if (!discordInput.value || !messageInput.value) {
        alert("A3mmer el inputs el kol ya m3allem!");
        return;
    }

    try {
        btn.disabled = true;
        btn.innerText = "Checking Security...";

        // 1. Get User IP (Bech n-ab3athouha l-el Google Script)
        const ipRes = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipRes.json();
        const userIP = ipData.ip;

        // 2. Prepare Data
        const formData = {
            discord: discordInput.value,
            message: messageInput.value
        };

        // 3. Send to Google Script Proxy
        btn.innerText = "Sending to Pixo...";
        
        // Hna n-ab3athou el IP f-el URL (?ip=...) bech el Google Script ya3refha
        await fetch(scriptURL + "?ip=" + userIP, {
            method: 'POST',
            mode: 'no-cors', 
            body: JSON.stringify(formData)
        });

        // 💡 Note: Google Script b-no-cors dima i-raja3 success f-el browser
        alert("Application sent! Pixo System will check your IP.");
        btn.innerText = "SENT SUCCESSFULLY";
        
        // Reset inputs
        discordInput.value = "";
        messageInput.value = "";

    } catch (error) {
        console.error("Error:", error);
        alert("Famma mochkla f-el site, jarreb marra okhra.");
        btn.disabled = false;
        btn.innerText = "SUBMIT APPLICATION";
    }
}
</script>
